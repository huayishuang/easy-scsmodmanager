# Triggered on a version tag (v*.*.*): validates the version, runs tests,
# builds every artifact, and publishes a GitHub Release with checksums.
name: Publish Release

on:
  push:
    tags: ["v*.*.*"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Verify version consistency
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PY_VERSION=$(python -c "exec(open('easy_scsmodmanager/__init__.py').read()); print(__version__)")
          if [ "$TAG_VERSION" != "$PY_VERSION" ]; then
            echo "::error::Version mismatch! Tag=$TAG_VERSION, __init__.py=$PY_VERSION"
            exit 1
          fi
      - name: Verify CHANGELOG entry
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          grep -q "\[$TAG_VERSION\]" CHANGELOG.md || {
            echo "::error::CHANGELOG.md missing entry for $TAG_VERSION"; exit 1; }

  test:
    needs: validate
    uses: ./.github/workflows/ci.yml

  build-appimage:
    needs: test
    uses: ./.github/workflows/build-appimage.yml

  build-windows:
    needs: test
    uses: ./.github/workflows/build-windows.yml

  build-packages:
    needs: test
    uses: ./.github/workflows/build-packages.yml

  create-release:
    needs: [build-appimage, build-windows, build-packages]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog for release notes
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          awk "/^## \[$TAG_VERSION\]/{flag=1; next} /^## \[/{flag=0} flag" \
            CHANGELOG.md > release_notes.md

      - uses: actions/download-artifact@v4
        with:
          name: EasySCSModManager-AppImage
      - uses: actions/download-artifact@v4
        with:
          name: EasySCSModManager-Windows-EXE
      - uses: actions/download-artifact@v4
        with:
          name: EasySCSModManager-tarball
      - uses: actions/download-artifact@v4
        with:
          name: EasySCSModManager-deb

      - name: Generate checksums
        run: |
          sha256sum \
            EasySCSModManager-x86_64.AppImage \
            EasySCSModManager.exe \
            EasySCSModManager-*-linux-x86_64.tar.gz \
            easy-scsmodmanager_*.deb \
            > SHA256SUMS.txt

      - uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: |
            EasySCSModManager-x86_64.AppImage
            EasySCSModManager.exe
            EasySCSModManager-*-linux-x86_64.tar.gz
            easy-scsmodmanager_*.deb
            SHA256SUMS.txt
